<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
  </g>

  <!-- 3x3 Card Grid (left side) -->
  <g transform="translate(120, 140)" filter="url(#shadow)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#475569" stroke-width="1.5"/>
    <rect x="90" y="0" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#475569" stroke-width="1.5"/>
    <rect x="180" y="0" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#6366f1" stroke-width="2"/>

    <!-- Row 2 -->
    <rect x="0" y="122" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#475569" stroke-width="1.5"/>
    <rect x="90" y="122" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="180" y="122" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#475569" stroke-width="1.5"/>

    <!-- Row 3 -->
    <rect x="0" y="244" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#6366f1" stroke-width="2"/>
    <rect x="90" y="244" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#475569" stroke-width="1.5"/>
    <rect x="180" y="244" width="80" height="112" rx="6" fill="url(#card-fill)" stroke="#475569" stroke-width="1.5"/>

    <!-- Card inner details (mana symbols / art boxes) -->
    <rect x="8" y="8" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="98" y="8" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="188" y="8" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>

    <rect x="8" y="130" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="98" y="130" width="64" height="40" rx="3" fill="#f59e0b" opacity="0.15"/>
    <rect x="188" y="130" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>

    <rect x="8" y="252" width="64" height="40" rx="3" fill="#6366f1" opacity="0.15"/>
    <rect x="98" y="252" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="188" y="252" width="64" height="40" rx="3" fill="#1e293b" opacity="0.6"/>

    <!-- Highlighted card glow effect -->
    <rect x="90" y="122" width="80" height="112" rx="6" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
    <rect x="180" y="0" width="80" height="112" rx="6" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
    <rect x="0" y="244" width="80" height="112" rx="6" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  </g>

  <!-- Text area (right side) -->
  <g transform="translate(500, 200)">
    <!-- "My" -->
    <text x="0" y="80" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="90" font-weight="800" fill="#e2e8f0" letter-spacing="-2">My</text>

    <!-- "9" with accent -->
    <text x="175" y="80" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="110" font-weight="900" fill="url(#accent)" letter-spacing="-2" filter="url(#glow)">9</text>

    <!-- "MTG" -->
    <text x="265" y="80" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="90" font-weight="800" fill="#e2e8f0" letter-spacing="-2">MTG</text>

    <!-- "Cards" -->
    <text x="0" y="160" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="300" fill="#94a3b8" letter-spacing="8">Cards</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="540" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#64748b" letter-spacing="2">Pick your cards. Share your story.</text>

  <!-- Decorative line -->
  <rect x="500" y="440" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
